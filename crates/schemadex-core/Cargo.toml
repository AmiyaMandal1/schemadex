[package]
name = "schemadex-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "Schema introspection and resolution toolkit for SQL agents — core crate"
readme = "../../README.md"
keywords = ["sql", "schema", "introspection", "agents", "llm"]
categories = ["database", "development-tools"]

[features]
default = []
postgres = ["sqlx/postgres", "sqlx/runtime-tokio-rustls"]
sqlite = ["sqlx/sqlite", "sqlx/runtime-tokio-rustls"]
duckdb_backend = ["dep:duckdb"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
thiserror.workspace = true
anyhow.workspace = true
async-trait.workspace = true
futures.workspace = true
sha2.workspace = true
hex.workspace = true
dirs.workspace = true
url.workspace = true
tracing.workspace = true
sqlx = { workspace = true, optional = true }
duckdb = { workspace = true, optional = true }
strsim.workspace = true
tiktoken-rs.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "rt-multi-thread", "macros"] }
tempfile = "3.13"

[[bench]]
name = "cache_refresh"
path = "benches/cache_refresh.rs"
harness = false
required-features = ["sqlite"]
